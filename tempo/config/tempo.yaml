server:
  http_listen_port: 3200
  http_listen_address: 0.0.0.0

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: C:/tempo/traces

backend_worker:
  compaction:
    block_retention: 336h # 14 Days in hours
    compaction_window: 2h
    max_block_bytes: 2147483648 # 2GB
  ring:
    kvstore:
      store: inmemory

querier:
  search:
    query_timeout: 30s
