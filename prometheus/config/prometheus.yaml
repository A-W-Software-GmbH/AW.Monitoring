global:
  scrape_interval: 5m # Default is every 1 minute.
  evaluation_interval: 5m # Default is every 1 minute.

# https://prometheus.io/docs/guides/opentelemetry/#promoting-resource-attributes
otlp: 
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.name
    - deployment.environment.name

rule_files:

scrape_configs:
  - job_name: "otel-collector-internal"
    scrape_interval: 5m
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: "prometheus"
    scrape_interval: 5m
    static_configs:
      - targets: ["localhost:9090"]

  #- job_name: "loki"
  #  scrape_interval: 5m
  #  static_configs:
  #    - targets: ["loki:3100"]

storage:
  tsdb:
    out_of_order_time_window: "10m"
