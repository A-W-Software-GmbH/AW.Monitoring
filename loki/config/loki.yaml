auth_enabled: false

server:
  http_listen_port: 3100
  http_listen_address: 0.0.0.0

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: C:\d

ingester:
  chunk_idle_period: 30m
  chunk_target_size: 1572864  # 1.5 MB
  max_chunk_age: 2h
  wal:
    enabled: true
    dir: C:\d\w
    checkpoint_duration: 5m
    flush_on_shutdown: true
  
schema_config:
  configs:
    - from: "2025-11-18"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: C:\d\t\i
    cache_location: C:\d\t\c
  filesystem:
    directory: C:\d\t

limits_config:
  allow_structured_metadata: true
  retention_period: 168h # 7 Days in hours

compactor:
  working_directory: C:\d\compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem
